<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="styles/pages/actual_page.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LADA: в наличии</title>
</head>
<body>
    <header>
        <nav>
            <a href="index.html">
                <img src="media/logo.png" alt="Логотип" class="image--scaling">
            </a>
            <button class="burger" id="burgerBtn" aria-label="Открыть меню">
                <span class="burger__line"></span>
                <span class="burger__line"></span>
                <span class="burger__line"></span>
            </button>
            <div class="navigation__buttons" id="navMenu">
                <a href="models.html" class="button--sharp">Модельный ряд</a>
                <a class="button--sharp">Конфигуратор</a>
                <a href="actual.html" class="button--sharp">Авто в наличии</a>
                <a href="profile.html" class="button--sharp">Личный кабинет</a>
            </div>
        </nav>
    </header>
    <section class="offers">
        <div class="offers_filters">
            <div class="filter__city">
                <div class="text--gray">Город</div>
                <select id="city" name="city">
                    <option value="">-</option>
                    <option value="msk">Москва</option>
                    <option value="spb">Санкт-Петербург</option>
                    <option value="ekb">Екатеринбург</option>
                </select>
            </div>
            <div class="filter__cost">
                <div class="text--gray">Цена</div>
                <input type="tel" placeholder="От:">
                <input type="tel" placeholder="До:">
            </div>
            <div class="filter__model">
                <div class="text--gray">Модель</div>
                <div class="text--gray text--light">
                    <input class="checker" type="checkbox" name="models" value="model1">
                    Модель
                </div>
                <div class="text--gray text--light">
                    <input class="checker" type="checkbox" name="models" value="model1">
                    Модель
                </div>
                <div class="text--gray text--light">
                    <input class="checker" type="checkbox" name="models" value="model1">
                    Модель
                </div>
                <div class="text--gray text--light">
                    <input class="checker" type="checkbox" name="models" value="model1">
                    Модель
                </div>
                <div class="text--gray text--light">
                    <input class="checker" type="checkbox" name="models" value="model1">
                    Модель
                </div>
            </div>
        </div>
        <div class="offers_cards">

        </div>
    </section>
    <footer class="footer">
        <div class="footer__lists">
            <div class="footer__list">
                <div class="text--gray">
                    Модельный ряд
                </div>
                <ul class="list">
                    <li>
                        <button class="button--light">Lada Nova</button>
                    </li>
                    <li>
                        <button class="button--light">Lada Riva</button>
                    </li>
                    <li>
                        <button class="button--light">Lada Signet</button>
                    </li>
                    <li>
                        <button class="button--light">Lada 2105</button>
                    </li>
                    <li>
                        <button class="button--light">Lada 2107</button>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Покупателям
                </div>
                <ul class="list">
                     <li>
                        <button class="button--light">Авто в наличии</button>
                    </li>
                    <li>
                        <button class="button--light">Конфигуратор</button>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Владельцам
                </div>
                <ul class="list">
                     <li>
                        <button class="button--light">Личный кабинет</button>
                    </li>
                </ul>
            </div>
        </div>
        <div class="footer__legal">
            -
        </div>
    </footer>
</body>
</html>
