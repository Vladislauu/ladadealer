<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="styles/pages/configurator/configurator.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LADA: в наличии</title>
</head>
<body>
    <header>
        <div class="header__content">
            <nav>
                <a href="index.html">
                    <img src="media/logo.png" alt="Логотип" class="image--scaling">
                </a>
                <button class="burger" id="burgerBtn" aria-label="Открыть меню">
                    <span class="burger__line"></span>
                    <span class="burger__line"></span>
                    <span class="burger__line"></span>
                </button>
                <div class="navigation__buttons" id="navMenu">
                    <a href="models.html" class="button--sharp">Модельный ряд</a>
                    <a href="configurator.html" class="button--sharp">Конфигуратор</a>
                    <a href="actual.html" class="button--sharp">Авто в наличии</a>
                    <a href="profile.html" class="button--sharp">Личный кабинет</a>
                </div>
            </nav>
            <div class="auth">
                <div class="auth__auth">
                    <input class="input--text" type="tel" placeholder="+7 (___) ___-__-__">
                    <input class="input--text" type="password" placeholder="Пароль">
                    <button class="button--red">Вход</button>
                    <button class="button--red">Регистрация</button>
                </div>
                <div class="auth__register">
                    <input class="input--text" type="tel" placeholder="+7 (___) ___-__-__">
                    <input class="input--text" type="password" placeholder="Фамилия">
                    <input class="input--text" type="password" placeholder="Имя">
                    <input class="input--text" type="password" placeholder="Отчество">
                    <input class="input--text" type="password" placeholder="Пароль">
                    <input class="input--text" type="password" placeholder="Повторите пароль">
                    <select id="city" name="city">
                        <option value="">Город</option>
                        <option value="msk">Москва</option>
                        <option value="spb">Санкт-Петербург</option>
                        <option value="ekb">Екатеринбург</option>
                    </select>
                    <button class="button--red">Зарегистрироваться</button>
                    <button class="button--red">Назад</button>
                </div>
            </div>
        </div>
    </header>
    <section class="configurator">
        <div class="configurator__preview">
            <img src="media/img1.png" alt="Логотип" class="image--scaling">
        </div>
        <div class="configurator__colors">
            <a class="color-pick"></a>
            <a class="color-pick"></a>
            <a class="color-pick"></a>
            <a class="color-pick"></a>
            <a class="color-pick"></a>
        </div>
        <div class="configurator__options">
            <div class="selection-panel">
                <div class="text--gray">Семейство</div>
                <select id="Family" name="Семейство">
                    <option value="">-</option>
                    <option value="msk">2105</option>
                    <option value="spb">2107</option>
                    <option value="ekb">Granta</option>
                </select>
                <div class="text--gray text--light">Описание...</div>
            </div>
            <div class="selection-panel">
                <div class="text--gray">Комплектация</div>
                <select id="Version" name="Комплектация">
                    <option value="">-</option>
                    <option value="msk">1.5</option>
                    <option value="spb">1.6</option>
                    <option value="ekb">Comfort</option>
                </select>
                <div class="text--gray text--light">Описание...</div>
            </div>
            <div class="selection-panel">
                <div class="text--gray">Итог</div>
                <div class="text--gray">000.000 РУБ.</div>
                <button class="button--red">Оставить заявку</button>

            </div>
        </div>
    </section>
    <footer class="footer">
        <div class="footer__lists">
            <div class="footer__list">
                <div class="text--gray">
                    Модельный ряд
                </div>
                <ul class="list">
                    <li>
                        <a href="configurator.html" class="button--light">Lada 2105</a>
                    </li>
                    <li>
                        <a href="configurator.html" class="button--light">Lada 2107</a>
                    </li>
                    <li>
                        <a href="configurator.html" class="button--light">Lada Granta</a>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Покупателям
                </div>
                <ul class="list">
                    <li>
                        <a href="actual.html" class="button--light">Авто в наличии</a>
                    </li>
                    <li>
                        <a href="models.html" class="button--light">Модельный ряд</a>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Владельцам
                </div>
                <ul class="list">
                     <li>
                        <button class="button--light">Личный кабинет</button>
                    </li>
                </ul>
            </div>
        </div>
        <div class="footer__legal">
            -
        </div>
    </footer>
</body>
</html>
