<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="styles/pages/main_page/main_page.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LADA</title>
</head>
<body>
    <header>
        <nav>
            <img src="media/logo.png" alt="Логотип" class="image--scaling">
            <button class="burger" id="burgerBtn" aria-label="Открыть меню">
                <span class="burger__line"></span>
                <span class="burger__line"></span>
                <span class="burger__line"></span>
            </button>
            <div class="navigation__buttons" id="navMenu">
                <button class="button--sharp">Модельный ряд</button>
                <button class="button--sharp">Конфигуратор</button>
                <button class="button--sharp">Авто в наличии</button>
                <button class="button--sharp">Личный кабинет</button>
            </div>
        </nav>
    </header>
    <section class="sales">
            <button class="button--left">&#10094;</button>
            <div class="sales__cards">
                <div id="lada2107" class="sales__card">
                    <img src="media/sale.jpg" class="image--fullfill">
                    <div class="text--title">LADA 2107 от 120 000 РУБ.</div>
                </div>
                <div id="lada2107" class="sales__card">
                    <img src="media/sale.jpg" class="image--fullfill">
                    <div class="text--title">LADA 2107 от 120 000 РУБ.</div>
                </div>
                <div id="lada2107" class="sales__card">
                    <img src="media/sale.jpg" class="image--fullfill">
                    <div class="text--title">LADA 2107 от 120 000 РУБ.</div>
                </div>
            </div>
            <button class="button--next">&#10095;</button>
        </section>
        <section class="popular">
            <button class="button--left" id="popular__switch--left">&#10094;</button>
            <div class="popular__track" id="popular__track">
                <div class="popular__card">
                    <img src="media/img1.png" alt="Подробнее" class="image--scaling">
                </div>
                <div class="popular__card">
                    <img src="media/img2.png" alt="Подробнее" class="image--scaling">
                </div>
                <div class="popular__card">
                    <img src="media/card1.png" alt="Подробнее" class="image--scaling">
                </div>
                <div class="popular__card">
                    <img src="media/card2.png" alt="Подробнее" class="image--scaling">
                </div>
                <div class="popular__card">
                    <img src="media/001.jpg" alt="Подробнее" class="image--scaling">
                </div>
            </div>
            <div class="popular__actions">
                <button class="button--red">Конфигуратор</button>
                <button class="button--red">О модели</button>
            </div>
            <button class="button--next" id="popular__switch--right">&#10095;</button>
        </section>
        <section class="service">
            <div class="service__info">
                <div class="text--gray">
                    Записывайте свой автомобиль на техническое обслуживание с удобством - в личном кабинете
                </div>
                <button class="button--red">Войти</button>
            </div>
        </section>
        <section class="consultation">
            <div class="text--gray">
                Получите дополнительную информацию по телефону!
            </div>
            <div class="consultation__form">
                <input type="tel" placeholder="+7 (___) ___-__-__">
                <button class="button--red">Отправить заявку</button>
            </div>
        </section>
    <footer class="footer">
        <div class="footer__lists">
            <div class="footer__list">
                <div class="text--gray">
                    Модельный ряд
                </div>
                <ul class="list">
                    <li>
                        <button class="button--light">Lada Nova</button>
                    </li>
                    <li>
                        <button class="button--light">Lada Riva</button>
                    </li>
                    <li>
                        <button class="button--light">Lada Signet</button>
                    </li>
                    <li>
                        <button class="button--light">Lada 2105</button>
                    </li>
                    <li>
                        <button class="button--light">Lada 2107</button>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Покупателям
                </div>
                <ul class="list">
                     <li>
                        <button class="button--light">Авто в наличии</button>
                    </li>
                    <li>
                        <button class="button--light">Конфигуратор</button>
                    </li>
                </ul>
            </div>
            <div class="footer__list">
                <div class="text--gray">
                    Владельцам
                </div>
                <ul class="list">
                     <li>
                        <button class="button--light">Личный кабинет</button>
                    </li>
                </ul>
            </div>
        </div>
        <div class="footer__legal">
            -
        </div>
    </footer>
    <script src="styles/components/navigation/burger.js"></script>
    <script src="styles/pages/main_page/popular.js"></script>
</body>
</html>
